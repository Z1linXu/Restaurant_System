plugins {
    id "com.android.application"
}

android {
    namespace "com.restaurant.pad"
    compileSdk 35

    defaultConfig {
        applicationId "com.restaurant.pad"
        minSdk 26
        targetSdk 35
        versionCode 2
        versionName "0.2.0-offline-pr7"
    }
}

tasks.register("verifyBundledFrontend", Exec) {
    workingDir rootProject.projectDir
    commandLine "bash", file("${rootProject.projectDir}/../scripts/verify-frontend-assets.sh").absolutePath
}

preBuild.dependsOn verifyBundledFrontend

dependencies {
    implementation "androidx.webkit:webkit:1.12.1"
}
