spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/restaurant_system
    username: your_username
    password: your_password
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: true

app:
  seed:
    runtime-enabled: true
    force-overwrite: false
    safe-metadata-enabled: true
    default-users-enabled: false
    demo-data-enabled: false
    membership-supplement-enabled: false
    production-bootstrap-enabled: false
  auth:
    jwt-secret: replace-with-a-long-random-production-secret
    access-token-expiration-seconds: 2592000
    refresh-token-expiration-days: 90
    x-user-id-fallback-enabled: true
