spring:
  profiles:
    active: local
  application:
    name: restaurant-system-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/restaurant_system
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  flyway:
    enabled: false
server:
  port: 8080

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

app:
  note: Local datasource credentials should be configured in application-local.yml.
  features:
    core-pos: true
    printing: true
    kds: false
    admin: true
    analytics: true
    platform: false
    developer-tools: false
  seed:
    runtime-enabled: true
    force-overwrite: false
  auth:
    jwt-secret: dev-local-restaurant-pos-change-this-secret-please-2026
    access-token-expiration-seconds: 900
    refresh-token-expiration-days: 30
    x-user-id-fallback-enabled: true
  dev-tools:
    role-switcher-enabled: false
