spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:restaurant_pos}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:CHANGE_ME}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

server:
  port: ${SERVER_PORT:8080}

app:
  features:
    core-pos: true
    printing: true
    kds: false
    admin: true
    analytics: true
    platform: false
    developer-tools: false
  seed:
    runtime-enabled: true
    force-overwrite: false
  auth:
    jwt-secret: ${JWT_SECRET:replace-this-pilot-secret-before-production-use}
    access-token-expiration-seconds: 900
    refresh-token-expiration-days: 14
    x-user-id-fallback-enabled: false
