services:
  db:
    image: postgres:${POSTGRES_IMAGE_TAG:-16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-restaurant_pos}
      POSTGRES_USER: ${DB_USER:-restaurant_pos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      TZ: ${TZ:-America/Toronto}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - restaurant-pos

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-restaurant-pos-backend:local}
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-cloud}
      SERVER_PORT: 8080
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-restaurant_pos}
      DB_USER: ${DB_USER:-restaurant_pos}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JAVA_OPTS: ${JAVA_OPTS:-}
      TZ: ${TZ:-America/Toronto}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8080"
    networks:
      - restaurant-pos

  nginx:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        VITE_APP_BUILD_VERSION: ${VITE_APP_BUILD_VERSION:-server}
    image: ${FRONTEND_IMAGE:-restaurant-pos-frontend:local}
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN is required}
      TZ: ${TZ:-America/Toronto}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./data/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./data/certbot-www:/var/www/certbot:ro
      - ./data/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - restaurant-pos

  certbot:
    image: certbot/certbot:${CERTBOT_IMAGE_TAG:-latest}
    profiles:
      - tools
    volumes:
      - ./data/certbot-www:/var/www/certbot
      - ./data/letsencrypt:/etc/letsencrypt
    networks:
      - restaurant-pos

networks:
  restaurant-pos:
    driver: bridge
